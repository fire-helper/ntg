<!DOCTYPE html>
<html>
  <head>
    <style>
      @keyframes wtf {
        from {
          height: 0;
        }

        to {
          height: 100%;
        }
      }
    </style>
  </head>
  <body style="width: 100vw; height: 100vh; margin: 0">
    <div style="display: flex; width: 100%; height: 100%">
      <div style="width: 50%; background: green"></div>
      <div style="width: 50%; background: red"></div>
    </div>

    <div
      style="
        width: 3px;
        margin: auto;
        background: white;
        animation-name: wtf;
        animation-duration: 2s;
      "
    ></div>
  </body>
</html>
